services:
  # Backend - Express + NodeJS
  reproductor-api:
    build:
      context: ../../Reproductor_FLAC/backend
      dockerfile: Dockerfile.dev
    image: reproductor-api:dev
    container_name: reproductor-api
    restart: no

    ports:
      - "3000:3000"

    # Volúmenes para hot-reload desde raíz del proyecto
    volumes:
      - ../../Reproductor_FLAC/backend:/app:cached
      - /app/node_modules

    env_file:
      - .env.docker

    working_dir: /app
    networks:
      - app_network

    # Labels para Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reproductor-api.rule=(Host(`localhost`) || Host(`your-server-ip`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.reproductor-api.entrypoints=web"
      - "traefik.http.services.reproductor-api.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.reproductor-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.reproductor-api.middlewares=reproductor-stripprefix"

  # Frontend - React + Vite
  reproductor-web:
    build:
      context: ../../Reproductor_FLAC/frontend
      dockerfile: Dockerfile.dev
    image: reproductor-web:dev
    container_name: reproductor-web
    restart: no

    ports:
      - "5174:5174"

    volumes:
      - ../../Reproductor_FLAC/frontend:/app:cached
      - /app/node_modules

    env_file:
      - .env.docker

    working_dir: /app
    networks:
      - app_network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.reproductor-web.rule=(Host(`localhost`) || Host(`your-server-ip`)) && PathPrefix(`/reproductor`)"
      - "traefik.http.routers.reproductor-web.entrypoints=web"
      - "traefik.http.services.reproductor-web.loadbalancer.server.port=5174"
      - "traefik.http.middlewares.reproductor-web-stripprefix.stripprefix.prefixes=/reproductor"
      - "traefik.http.routers.reproductor-web.middlewares=reproductor-web-stripprefix"

networks:
  app_network:
    external: true
    name: app_network
